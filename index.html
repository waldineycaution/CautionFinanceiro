<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F5A800">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CautionFIN">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>CautionFIN — Painel Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>

  <!-- ══ DESKTOP SIDEBAR (oculto no mobile via CSS) ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="https://res.cloudinary.com/dhah982iz/image/upload/v1775956287/caution-tech_spo3lf.png" alt="CautionFIN" style="width:42px;height:42px;object-fit:contain;border-radius:8px;flex-shrink:0">
      <div>
        <div class="logo-name">CautionFIN</div>
        <div class="logo-sub">Painel Financeiro</div>
      </div>
    </div>
    <div class="sidebar-month">
      <div class="sidebar-month-label">Período</div>
      <div class="sidebar-month-nav">
        <button class="month-nav" id="btnPrevMonth">&#8249;</button>
        <div class="sidebar-month-display" id="monthChip">Carregando...</div>
        <button class="month-nav" id="btnNextMonth">&#8250;</button>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-nav-item active" id="snav-dash" data-tab="dash">
        <span class="sidebar-nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512694/dash_1_ofhrhj.png" style="width:20px;height:20px;object-fit:contain;opacity:0.6" class="nav-img"></span>
        <span class="sidebar-nav-label">Dashboard</span>
      </div>
      <div class="sidebar-nav-item" id="snav-filiais" data-tab="filiais">
        <span class="sidebar-nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512639/Filiais_p6pxag.png" style="width:20px;height:20px;object-fit:contain;opacity:0.6" class="nav-img"></span>
        <span class="sidebar-nav-label">Filiais</span>
      </div>
      <div class="sidebar-nav-item" id="snav-gastos" data-tab="gastos">
        <span class="sidebar-nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512805/Lancamentos_rhejgn.png" style="width:20px;height:20px;object-fit:contain;opacity:0.6" class="nav-img"></span>
        <span class="sidebar-nav-label">Lançamentos</span>
      </div>
      <div class="sidebar-nav-item" id="snav-despesas" data-tab="despesas">
        <span class="sidebar-nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512459/outros_u4s7re.png" style="width:20px;height:20px;object-fit:contain;opacity:0.6" class="nav-img"></span>
        <span class="sidebar-nav-label">Despesas Extras</span>
      </div>
      <div class="sidebar-nav-item" id="snav-config" data-tab="config">
        <span class="sidebar-nav-icon">⚙️</span>
        <span class="sidebar-nav-label">Configurações</span>
      </div>
      <a href="https://docs.google.com/spreadsheets/d/16uXxU4CxF6-D27sXkWEFkggXhFlVmtjPqITm1wpH_-I/edit?gid=1575202805#gid=1575202805" target="_blank" class="sidebar-nav-item" style="text-decoration:none;margin-top:4px">
        <span class="sidebar-nav-icon">
          <img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777604515/sheets_1_lhmtfg.png" style="width:20px;height:20px;object-fit:contain">
        </span>
        <span class="sidebar-nav-label">Planilha</span>
        <span style="font-size:9px;color:var(--text3);margin-left:auto">↗</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <!-- Status de conexão -->
      <div class="sidebar-status-row">
        <div class="status-pill" id="firebaseStatusPill">
          <div class="status-dot"></div>
          <span>Firebase</span>
        </div>
        <div class="status-pill" id="sheetsStatusPill">
          <div class="status-dot"></div>
          <span>Sheets</span>
        </div>
      </div>

      <button class="sidebar-receita-btn" id="btnReceita">Lancar Receita</button>
      <button class="sidebar-add-btn" id="sheetsSyncBtn" onclick="sheetsSignIn()" style="margin-top:8px">📊 Conectar Sheets</button>
      <button class="sidebar-add-btn" id="sidebarAddBtn">+ Novo Funcionario</button>
    </div>
  </aside>

  <!-- ══ MOBILE HEADER (oculto no desktop via CSS) ══ -->
  <header class="header" id="mobileHeader">
    <div class="header-top">
      <div class="logo">
        <img src="https://res.cloudinary.com/dhah982iz/image/upload/v1775956287/caution-tech_spo3lf.png" alt="CautionFIN" style="width:36px;height:36px;object-fit:contain;border-radius:8px;flex-shrink:0">
        <div>
          <div class="logo-name">CautionFIN</div>
          <div class="logo-sub">Painel Financeiro</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="icon-btn" id="btnReceitaMobile"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512440/salario_jjqukq.png" style="width:18px;height:18px;object-fit:contain;opacity:0.6"></div>
        <div class="icon-btn">&#128276;</div>
      </div>
    </div>
    <div class="month-bar">
      <button class="month-nav" id="btnPrevMonthMobile">&#8249;</button>
      <div class="month-chip" id="monthChipMobile">Carregando...</div>
      <button class="month-nav" id="btnNextMonthMobile">&#8250;</button>
      <div class="year-pill" id="yearPillMobile"></div>
    </div>
  </header>

  <!-- ══ DESKTOP MAIN ══ -->
  <div class="desktop-main" id="desktopMain">
    <div class="desktop-topbar" id="desktopTopbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-sub" id="topbarSub">Visao geral do periodo</div>
      </div>
      <div class="topbar-actions">
        <div class="topbar-year" id="yearPill"></div>
        <div class="icon-btn" title="Notificacoes">&#128276;</div>
      </div>
    </div>
    <main class="content" id="appMain"></main>
  </div>

  <!-- ══ MOBILE BOTTOM NAV ══ -->
  <nav class="bottom-nav" id="mobileNav">
    <div class="nav-item active" id="nav-dash" data-tab="dash">
      <div class="nav-dot"></div>
      <div class="nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512694/dash_1_ofhrhj.png" style="width:22px;height:22px;object-fit:contain;opacity:0.6" class="nav-img"></div>
      <div class="nav-label">Dashboard</div>
    </div>
    <div class="nav-item" id="nav-filiais" data-tab="filiais">
      <div class="nav-dot"></div>
      <div class="nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512639/Filiais_p6pxag.png" style="width:22px;height:22px;object-fit:contain;opacity:0.6" class="nav-img"></div>
      <div class="nav-label">Filiais</div>
    </div>
    <div class="nav-item" id="nav-gastos" data-tab="gastos">
      <div class="nav-dot"></div>
      <div class="nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512805/Lancamentos_rhejgn.png" style="width:22px;height:22px;object-fit:contain;opacity:0.6" class="nav-img"></div>
      <div class="nav-label">Lançamentos</div>
    </div>
    <div class="nav-item" id="nav-despesas" data-tab="despesas">
      <div class="nav-dot"></div>
      <div class="nav-icon"><img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777512459/outros_u4s7re.png" style="width:22px;height:22px;object-fit:contain;opacity:0.6" class="nav-img"></div>
      <div class="nav-label">Despesas</div>
    </div>
    <div class="nav-item" id="nav-config" data-tab="config">
      <div class="nav-dot"></div>
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">Config</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/16uXxU4CxF6-D27sXkWEFkggXhFlVmtjPqITm1wpH_-I/edit?gid=1575202805#gid=1575202805" target="_blank" class="nav-item" style="text-decoration:none">
      <div class="nav-dot" style="opacity:0"></div>
      <div class="nav-icon">
        <img src="https://res.cloudinary.com/dhah982iz/image/upload/v1777604515/sheets_1_lhmtfg.png" style="width:22px;height:22px;object-fit:contain;opacity:0.7">
      </div>
      <div class="nav-label" style="color:var(--text3)">Planilha</div>
    </a>
  </nav>

  <!-- MOBILE FAB -->
  <button class="fab hidden" id="fab">+</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- MODALS -->
  <div class="overlay" id="empOverlay">
    <div class="sheet"><div class="sheet-handle"></div><div id="empSheetContent"></div></div>
  </div>
  <div class="overlay" id="revOverlay">
    <div class="sheet"><div class="sheet-handle"></div><div id="revSheetContent"></div></div>
  </div>
  <div class="overlay" id="benOverlay">
    <div class="sheet"><div class="sheet-handle"></div><div id="benSheetContent"></div></div>
  </div>

  <!-- Google API (para Sheets) -->
  <script src="https://apis.google.com/js/api.js"></script>

  <!-- Firebase SDKs (compat version — funciona sem bundler) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- JS MODULES -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/filiais.js"></script>
  <script src="js/views/gastos.js"></script>
  <script src="js/views/despesas.js"></script>
  <script src="js/views/config.js"></script>
  <script src="js/modals/employee.js"></script>
  <script src="js/modals/revenue.js"></script>
  <script src="js/modals/benefit.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) { console.log('✅ PWA: Service Worker registrado'); })
          .catch(function(err) { console.warn('PWA: SW falhou', err); });
      });
    }
  </script>
</body>
</html>
